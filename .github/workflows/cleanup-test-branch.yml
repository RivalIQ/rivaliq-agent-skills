name: Cleanup Test Branch

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Test branch to delete.
        required: true
        type: string

permissions:
  contents: write

jobs:
  cleanup-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        run: |
          branch="${{ inputs.target_branch }}"
          case "$branch" in
            test-agent-skill-*)
              ;;
            *)
              echo "ERROR: refusing to delete non-test branch '$branch'"
              exit 1
              ;;
          esac

      - name: Delete remote test branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" --delete "${{ inputs.target_branch }}"
